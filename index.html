ero .moral{font-size:.85em;color:var(--subtle);font-style:italic;border-top:1px solid var(--border);padding-top:14px;margin-top:14px}.result-hero .moral strong{font-style:normal;color:var(--text)}.axis-chart{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:28px 24px;margin-bottom:32px;text-align:center}.axis-chart h3{font-family:'Libre Baskerville',serif;font-size:1em;color:var(--accent);margin-bottom:16px}.axis-canvas-wrap{position:relative;width:300px;height:300px;margin:0 auto 8px}.axis-canvas{width:100%;height:100%}.axis-label{position:absolute;font-size:.68em;color:var(--subtle);font-weight:600;text-transform:uppercase;letter-spacing:.5px}.axis-label.top{top:-20px;left:50%;transform:translateX(-50%)}.axis-label.bottom{bottom:-20px;left:50%;transform:translateX(-50%)}.axis-label.left{left:-54px;top:50%;transform:translateY(-50%) rotate(-90deg)}.axis-label.right{right:-72px;top:50%;transform:translateY(-50%) rotate(90deg)}.axis-note{font-size:.72em;color:var(--subtle);font-style:italic;margin-top:16px;line-height:1.5;max-width:500px;margin-left:auto;margin-right:auto}.axis-legend{display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:.72em;color:var(--subtle)}.axis-legend span{display:flex;align-items:center;gap:4px}.runners-up{background:var(--case-bg);border-radius:8px;padding:20px 24px;margin-bottom:32px}.runners-up h3{font-family:'Libre Baskerville',serif;font-size:1em;color:var(--accent);margin-bottom:10px}.runner{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.88em;border-bottom:1px solid var(--border)}.runner:last-child{border-bottom:none}.runner-name{font-weight:600;flex-shrink:0;margin-right:12px}.runner-bar-wrap{width:120px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0}.runner-bar{height:100%;background:var(--accent);border-radius:4px}.reveal-btn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:16px;font-family:'DM Sans',sans-serif;font-size:1em;font-weight:600;cursor:pointer;margin-bottom:32px}.reveal-btn:hover{background:#6e2e2e}.full-map{display:none}.section-label{font-family:'Libre Baskerville',serif;font-size:1.3em;font-weight:700;margin:36px 0 8px}.section-label.labour{color:var(--labour)}.section-label.tory{color:var(--tory)}.section-sublabel{color:var(--subtle);font-size:.85em;margin-bottom:20px;font-style:italic}.tribe-card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:14px;position:relative}.tribe-card.is-you{border-color:var(--accent);border-width:2px;background:#fdf8f0}.tribe-card.is-you::after{content:'\2190 You';position:absolute;top:12px;right:14px;font-size:.72em;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px}.tribe-name{font-family:'Libre Baskerville',serif;font-size:1.05em;font-weight:700;margin-bottom:3px}.tribe-people{font-size:.82em;color:var(--accent);margin-bottom:8px;font-weight:500}.tribe-desc{font-size:.88em;color:var(--text);line-height:1.6}.tribe-moral{font-size:.78em;color:var(--subtle);border-top:1px solid var(--border);padding-top:8px;margin-top:8px;font-style:italic}.tribe-moral strong{color:var(--text);font-style:normal}.case-study-box{background:var(--case-bg);border:2px solid var(--border);border-radius:8px;padding:24px;margin-top:40px}.case-study-box h2{font-family:'Libre Baskerville',serif;font-size:1.15em;color:var(--accent);margin-bottom:6px}.case-study-box .cs-subtitle{font-size:.82em;color:var(--subtle);font-style:italic;margin-bottom:14px}.case-study-box p{font-size:.88em;line-height:1.7;margin-bottom:10px}.vote-row{display:flex;gap:14px;margin:16px 0}.vote-col{flex:1;background:var(--card-bg);border-radius:6px;padding:14px;border:1px solid var(--border)}.vote-col h3{font-family:'Libre Baskerville',serif;font-size:.9em;margin-bottom:6px}.vote-col.for h3{color:var(--green)}.vote-col.against h3{color:var(--accent)}.vote-col ul{list-style:none;font-size:.78em;line-height:1.8}.frameworks{background:var(--card-bg);border:2px solid var(--accent);border-radius:8px;padding:24px;margin-top:40px}.frameworks h2{font-family:'Libre Baskerville',serif;font-size:1.15em;color:var(--accent);margin-bottom:14px}.frameworks p{font-size:.9em;line-height:1.7;margin-bottom:10px}.frameworks p:last-child{margin-bottom:0}.reading{margin-top:40px;padding-top:28px;border-top:2px solid var(--border)}.reading h2{font-family:'Libre Baskerville',serif;font-size:1.15em;color:var(--accent);margin-bottom:14px}.reading p{font-size:.88em;line-height:1.7;margin-bottom:6px}.restart-btn{display:block;width:100%;background:none;border:2px solid var(--accent);color:var(--accent);border-radius:8px;padding:14px;font-family:'DM Sans',sans-serif;font-size:.95em;font-weight:600;cursor:pointer;margin-top:40px}.restart-btn:hover{background:var(--accent);color:#fff}@media(max-width:600px){header h1{font-size:1.6em}.question-card{padding:20px}.container{padding:24px 16px 60px}.vote-row{flex-direction:column}.result-hero{padding:24px 20px}}

<header><h1>What's Your Political Tribe?</h1><p class="subtitle">12 tribes hide inside British politics. Answer 20 questions to find yours — most people are surprised where they land.</p></header>
<div id="quiz"><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div class="q-counter" id="qCounter">Question 1 of 20</div><div class="question-card" id="questionCard"></div></div>
<div class="results-container" id="results"></div>

<script>
var tribes={fabian:{name:"Fabian Technocrats",people:"Starmer, Reeves, Streeting, McFadden. Historically Blair, Brown, Mandelson. The Fabian Society, IPPR, Resolution Foundation.",desc:"Believe in managed progress through rational institutions. Meritocratic, data-driven, instinctively centrist. Their ideal society is basically Denmark. Comfortable with capitalism if properly regulated. Intellectually descended from the Webbs.",moral:"What produces the best outcomes for the most people.",side:"left"},identitarian:{name:"The Identitarian Left",people:"Kehinde Andrews, Priyamvada Gopal, Afua Hirsch, Reni Eddo-Lodge. Institutionally embedded in universities, HR departments, DEI consultancies, parts of the charity sector and the arts.",desc:"Intellectual roots in post-structuralism, critical race theory, and Foucault. The key move: liberal universalism and individual rights are themselves expressions of white, male, colonial power. Moral authority derives from positionality. A traditional socialist says the real divide is class; this tribe says it\u2019s race, gender, sexuality, and colonial history.",moral:"Your relationship to structures of oppression determines the authority of your voice.",side:"left"},revolutionary:{name:"Revolutionary Marxists / Anti-Imperialists",people:"The SWP, Counterfire, George Galloway, John Rees, Lindsey German. The Morning Star. Stop the War Coalition. The Gaza independents in Parliament.",desc:"Materialist and structural \u2014 imperialism is the highest stage of capitalism, Western foreign policy is the root of global conflict, liberal democracy is a bourgeois facade. Many are religiously informed. This tribe regards revolutionary violence as potentially legitimate.",moral:"Are you on the side of the workers or of capital? Everything else is superstructure.",side:"left"},progressive:{name:"The Progressive Left (Corbynite)",people:"Corbyn, McDonnell, Zarah Sultana, Nadia Whittome, Owen Jones. Novara Media, Tribune magazine.",desc:"Economically democratic socialist. On foreign policy, lean anti-imperialist. On social questions, aligned with the identitarian left. The fatal tension: its economic base in working-class communities was culturally conservative in ways its activist base in London and university towns was not.",moral:"Solidarity \u2014 stretched across economic radicalism and social progressivism in ways that don\u2019t always cohere.",side:"left"},degrowth:{name:"Green-Adjacent Degrowthers",people:"Caroline Lucas, George Monbiot, Jason Hickel. Extinction Rebellion, Just Stop Oil.",desc:"Material progress is the problem, but social progress is still the project. Radical austerity about consumption paired with radical liberalism about identity. The irony: telling people who\u2019ve never had material security that the real project is consuming less is an easier sell in a seminar than in a working-class town.",moral:"The planet sets limits that override human desire. Growth itself is the enemy.",side:"left"},bluelabour:{name:"Blue Labour / Post-Liberals",people:"Maurice Glasman, Jon Cruddas, Dan Carden, Paul Embery, Jonathan Rutherford, Shabana Mahmood. Intellectually rooted in Tawney, G.D.H. Cole, MacIntyre, Karl Polanyi.",desc:"Economically left, culturally conservative. Rooted in Christian socialism and trade union communitarianism. Material progress is a moral obligation. But the endless expansion of autonomous individual choice eventually undermines the communities that make good lives possible. Currently in flux: Glasman has moved toward MAGA and Reform.",moral:"Human dignity is given by God \u2014 every person has equal worth, and that worth imposes obligations on society.",side:"left"},union:{name:"Union Pragmatists",people:"Sharon Graham (Unite), Christina McAnea (Unison), Gary Smith (GMB). Historically Ernest Bevin.",desc:"Bread-and-butter materialism. Wages, conditions, pensions, job security. Suspicious of culture war politics on either side because it distracts from what actually matters to working people.",moral:"Did your pay go up? Are your conditions safe? Everything else is noise.",side:"left"},burkean:{name:"Burkean Traditionalists",people:"The late Roger Scruton. Jesse Norman. Rory Stewart. John Gray.",desc:"Gradual reform, inherited institutions, the Crown, the Church, the countryside. Suspicious of ideology from any direction \u2014 including free market radicalism. Revere custom, continuity, and the wisdom of the dead. Nearly extinct as an organised parliamentary force.",moral:"We inherit obligations we didn\u2019t choose. Duty, custom, and continuity outweigh individual desire.",side:"right"},thatcherite:{name:"Thatcherite Free Marketeers",people:"Liz Truss, Kwasi Kwarteng, Jacob Rees-Mogg, Kemi Badenoch (partly). The IEA, Adam Smith Institute, TaxPayers\u2019 Alliance. The Telegraph editorial line.",desc:"Low tax, deregulation, individual enterprise. Descended from Hayek and Friedman. Their fundamental weakness: no answer to what holds a society together once the market has dissolved every traditional bond.",moral:"Free exchange between consenting individuals is the foundation of a just society.",side:"right"},natcon:{name:"National Conservatives / Post-Liberal Right",people:"Danny Kruger, Nick Timothy, Miriam Cates. Phillip Blond (ResPublica). UnHerd is their natural media home.",desc:"Sceptical of free markets, sceptical of mass immigration, interested in community, family, and national identity. Share intellectual DNA with Blue Labour but arrive from a different starting point on redistribution and unions.",moral:"The nation is a real community with real obligations \u2014 not just an economic zone.",side:"right"},populist:{name:"Reform-Adjacent Populists",people:"Nigel Farage, Richard Tice, Lee Anderson, Ann Widdecombe. GB News is the media expression.",desc:"More a mood than a philosophy. Anti-establishment, anti-immigration, rhetorically anti-elite. Draw energy from genuine grievances but lack a coherent intellectual framework. Currently the most electorally dynamic force on the right.",moral:"The people vs the elite. A friend-enemy distinction that can be captured by left or right.",side:"right"},libertarian:{name:"Libertarians / Free Speech Absolutists",people:"Toby Young (Free Speech Union). Brendan O\u2019Neill, Claire Fox (Spiked Online). Some younger Spectator writers.",desc:"Small but vocal. Sceptical of the state in almost all domains. The Spiked crowd retain a Marxist analytical framework but have arrived at libertarian conclusions, which baffles everyone.",moral:"Leave people alone and let them choose. Individual sovereignty is sacred.",side:"right"}};
var figures=[{name:"Thatcher",x:-0.7,y:0.6,shape:"square"},{name:"Badenoch",x:-0.5,y:0.3,shape:"circle"},{name:"Attlee",x:0.35,y:0.15,shape:"circle"},{name:"Stuart Hall",x:0.5,y:0.8,shape:"square"},{name:"Polanski",x:0.5,y:0.4,shape:"square"},{name:"Starmer",x:0.1,y:0.25,shape:"square"},{name:"Orwell",x:0.1,y:-0.25,shape:"circle"},{name:"Farage",x:0.2,y:-0.5,shape:"circle"},{name:"Chesterton",x:0.6,y:-0.7,shape:"circle"},{name:"Cobbett",x:0.65,y:-0.8,shape:"circle"},{name:"Tawney",x:0.7,y:-0.35,shape:"circle"}];
var questions=[
{text:"Your city is building a new civic centre. What should it look like?",options:[{label:"Something bold and contemporary. Glass, steel, sustainable materials. Architecture should look forward, not backward.",scores:{fabian:2,degrowth:2},axis:{x:0,y:2},sov:0},{label:"Build it to last, in keeping with its surroundings. Brick, stone, pitched roofs. New buildings don\u2019t have to look like airports.",scores:{bluelabour:2,burkean:2,natcon:1},axis:{x:2,y:-2},sov:1},{label:"Who cares what it looks like? Spend the money on services instead of vanity projects for architects.",scores:{union:3,populist:1},axis:{x:1,y:0},sov:0},{label:"Whatever the market delivers most efficiently. If a developer can build it cheaper and faster, let them.",scores:{thatcherite:3,libertarian:1},axis:{x:-2,y:1},sov:0}]},
{text:"A global crisis disrupts oil supplies through the Strait of Hormuz. Energy prices spike. Should the UK expand North Sea oil production?",options:[{label:"Yes. Energy security is national security. Drill everything we\u2019ve got.",scores:{populist:2,thatcherite:2,natcon:1},axis:{x:0,y:-1},sov:2},{label:"Expand cautiously as a bridge, but accelerate the transition to renewables.",scores:{fabian:3},axis:{x:0,y:1},sov:0},{label:"This is a wake-up call. Double down on renewables and demand reduction. More drilling just delays the inevitable reckoning with fossil capitalism.",scores:{degrowth:3,progressive:1},axis:{x:0,y:1},sov:-1},{label:"We should use our own resources to protect our own people. But the profits should stay here \u2014 not flow to shareholders in Houston. Nationalise it.",scores:{bluelabour:2,union:2,revolutionary:1},axis:{x:2,y:-1},sov:2}]},
{text:"The government proposes a wealth tax on assets over \u00a310 million. Your reaction?",options:[{label:"About time. Extreme wealth concentration is incompatible with a functioning democracy.",scores:{progressive:2,revolutionary:2},axis:{x:1,y:1},sov:0},{label:"Sounds fair in principle but will drive capital abroad. Better to close loopholes and tax income properly.",scores:{fabian:3},axis:{x:0,y:1},sov:0},{label:"Taxation is legalised theft. People earned that money \u2014 let them keep it.",scores:{thatcherite:3,libertarian:2},axis:{x:-3,y:1},sov:0},{label:"Fine, but only if the revenue goes to communities that need it \u2014 not to fund more London consultants.",scores:{bluelabour:1,populist:2,union:2},axis:{x:2,y:-1},sov:1}]},
{text:"Should employers use positive discrimination to increase workforce diversity?",options:[{label:"Yes. Without active measures, structural inequalities just reproduce themselves.",scores:{identitarian:3,progressive:1},axis:{x:1,y:2},sov:-1},{label:"No. Hire on merit. Anything else is patronising to the people it claims to help.",scores:{libertarian:2,thatcherite:2},axis:{x:-2,y:0},sov:0},{label:"The real issue is class, not identity. A black Etonian doesn\u2019t need a leg up over a white kid from Hartlepool.",scores:{bluelabour:2,union:2,revolutionary:1},axis:{x:1,y:-1},sov:0},{label:"Diversity targets are fine as long as they\u2019re evidence-based and don\u2019t become performative box-ticking.",scores:{fabian:2,burkean:1},axis:{x:0,y:1},sov:0}]},
{text:"Someone is convicted of their fifth shoplifting offence in two years. Should they go to prison?",options:[{label:"Yes. At some point consequences have to mean something. Repeat offenders are taking the public for mugs.",scores:{populist:2,thatcherite:2},axis:{x:0,y:-1},sov:0},{label:"Prison for shoplifting is absurd and expensive. Invest in the things that actually stop reoffending \u2014 housing, mental health, addiction services.",scores:{fabian:2,progressive:2},axis:{x:0,y:2},sov:0},{label:"Ask why they\u2019re shoplifting five times. This is poverty and desperation \u2014 it\u2019s a systemic problem.",scores:{revolutionary:2,identitarian:2},axis:{x:1,y:2},sov:0},{label:"Community sentences with real structure \u2014 work, mentoring, accountability. Prison destroys whatever\u2019s left of someone\u2019s connection to their community.",scores:{bluelabour:2,burkean:2,union:1},axis:{x:2,y:-1},sov:0}]},
{text:"A man is convicted of a serious violent assault. The judge gives him four years \u2014 he\u2019ll serve two. Is that enough?",options:[{label:"No. Violent criminals should serve their full sentence. The public has a right to be protected.",scores:{populist:2,thatcherite:2,natcon:1},axis:{x:0,y:-1},sov:0},{label:"Sentence length matters less than what happens during it. Two years of proper rehabilitation beats ten years of warehousing.",scores:{fabian:2,progressive:2},axis:{x:0,y:2},sov:0},{label:"The focus on individual punishment distracts from the structural violence of poverty, racism, and inequality that produces crime.",scores:{identitarian:2,revolutionary:2},axis:{x:1,y:2},sov:0},{label:"Justice means something to victims and to the wider community. Short sentences for serious violence corrode public trust.",scores:{bluelabour:2,burkean:2,union:1},axis:{x:2,y:-1},sov:0}]},
{text:"The government proposes a significant increase in defence spending. Your reaction?",options:[{label:"Necessary. The world is getting more dangerous and we have obligations to NATO and our allies.",scores:{fabian:2,burkean:2,natcon:1},axis:{x:1,y:0},sov:1},{label:"We should be strong enough to defend ourselves, but the real threat to most people isn\u2019t foreign armies \u2014 it\u2019s stagnant wages and crumbling public services.",scores:{union:2,bluelabour:2},axis:{x:2,y:-1},sov:1},{label:"Western military spending is the problem, not the solution. NATO expansion and arms sales fuel the very conflicts we claim to oppose.",scores:{revolutionary:3,progressive:2},axis:{x:1,y:2},sov:-2},{label:"Spend whatever it takes. A country that won\u2019t defend itself won\u2019t exist for long.",scores:{populist:2,thatcherite:2},axis:{x:0,y:-1},sov:2}]},
{text:"The government cuts the foreign aid budget to fund domestic priorities. Your reaction?",options:[{label:"Shameful. We\u2019re one of the richest countries on earth. Helping the world\u2019s poorest is a moral obligation.",scores:{fabian:2,progressive:2},axis:{x:0,y:2},sov:-1},{label:"Good. Charity begins at home. We\u2019ve got food banks and homeless veterans \u2014 sort that out first.",scores:{populist:3,union:1},axis:{x:1,y:-1},sov:2},{label:"Foreign aid is neo-colonial soft power disguised as generosity. It serves Western interests, not the global poor.",scores:{revolutionary:2,identitarian:2},axis:{x:1,y:1},sov:-1},{label:"There\u2019s a case for aid rooted in Christian duty, but it should go through churches and communities, not government bureaucracies.",scores:{bluelabour:2,burkean:2,natcon:1},axis:{x:2,y:-2},sov:1}]},
{text:"The UK commits to net zero by 2050. Is this the right priority?",options:[{label:"2050 is far too late. We need radical transformation now \u2014 degrowth, not green growth.",scores:{degrowth:3},axis:{x:1,y:0},sov:-1},{label:"It\u2019s the right goal but we need a realistic transition that doesn\u2019t destroy jobs and livelihoods.",scores:{fabian:2,union:1},axis:{x:0,y:1},sov:0},{label:"Net zero is an elite project. Working people will pay the price while the rich fly private.",scores:{populist:3,union:1},axis:{x:1,y:-1},sov:1},{label:"We should honour our obligation to creation and to future generations, but not by hollowing out the communities that already exist.",scores:{bluelabour:2,natcon:2,burkean:1},axis:{x:2,y:-2},sov:1}]},
{text:"A statue of a historical figure with links to the slave trade stands in your city centre. What should happen?",options:[{label:"Take it down. Public monuments are about who we honour, and we shouldn\u2019t honour slave traders.",scores:{identitarian:3,progressive:1},axis:{x:0,y:2},sov:0},{label:"Put it in a museum with full context. Don\u2019t erase history \u2014 explain it.",scores:{fabian:2,burkean:1},axis:{x:0,y:0},sov:0},{label:"Leave it. Tearing down statues is the mob deciding what history is acceptable. This is how civilisations unravel.",scores:{burkean:2,natcon:1,populist:2},axis:{x:1,y:-2},sov:1},{label:"The statue is a distraction. The real legacy of slavery is in the economic structures that still exploit the global south.",scores:{revolutionary:3},axis:{x:1,y:1},sov:-1}]},
{text:"A tech company automates 10,000 jobs. GDP rises but unemployment spikes. Your view?",options:[{label:"This is progress. Don\u2019t interfere \u2014 the market will create new industries. It always does.",scores:{thatcherite:3,libertarian:1},axis:{x:-2,y:2},sov:-1},{label:"The state should manage the transition \u2014 retraining programmes, investment in new sectors, a proper safety net.",scores:{fabian:3},axis:{x:0,y:1},sov:0},{label:"If work has dignity, then destroying it for profit is a moral failure \u2014 not a neutral efficiency gain.",scores:{bluelabour:3,natcon:2},axis:{x:2,y:-2},sov:1},{label:"This is what capitalism does \u2014 replaces people with machines and calls it progress.",scores:{revolutionary:2,union:2},axis:{x:2,y:1},sov:0}]},
{text:"A factory in a northern town is about to close. 300 jobs will be lost. What\u2019s your instinct?",options:[{label:"The government should intervene \u2014 retrain workers, attract new industry, protect the community.",scores:{fabian:2,bluelabour:1,union:1},axis:{x:1,y:1},sov:1},{label:"This is tragic but markets adapt. The workers will find new opportunities if we remove barriers.",scores:{thatcherite:3,libertarian:1},axis:{x:-2,y:2},sov:-1},{label:"This is what happens when capital is free to move but workers aren\u2019t. The whole system needs changing.",scores:{revolutionary:2,progressive:2},axis:{x:1,y:2},sov:-1},{label:"This is why we need to protect national industry. A country that can\u2019t make things is a country that\u2019s lost its soul.",scores:{natcon:2,populist:1,bluelabour:1},axis:{x:2,y:-2},sov:2}]},
{text:"A terminally ill person wants help ending their life. What\u2019s the right response?",options:[{label:"It\u2019s their body and their choice. Regulate it carefully, but respect their autonomy.",scores:{libertarian:2,fabian:1,degrowth:1},axis:{x:-2,y:1},sov:0},{label:"The compassionate answer is better palliative care, not offering death as a solution to a system that\u2019s failed them.",scores:{bluelabour:3,natcon:2,burkean:1},axis:{x:2,y:-2},sov:0},{label:"I worry about the pressure on vulnerable people \u2014 the poor and disabled will feel they should get out of the way.",scores:{progressive:2,union:1,bluelabour:1},axis:{x:1,y:-1},sov:0},{label:"This is a question for communities and families, not the state. We\u2019ve lost the ability to care for our dying.",scores:{burkean:3,natcon:1},axis:{x:2,y:-3},sov:0}]},

var currentQ=0;var scores={};var axisX=0;var axisY=0;var sovScore=0;Object.keys(tribes).forEach(function(k){scores[k]=0});
function renderQuestion(){var q=questions[currentQ];var card=document.getElementById('questionCard');document.getElementById('progressFill').style.width=((currentQ/questions.length)*100)+'%';document.getElementById('qCounter').textContent='Question '+(currentQ+1)+' of '+questions.length;var html='<div class="question-text">'+q.text+'</div>';q.options.forEach(function(opt,i){html+='<div class="option" onclick="answer('+i+')">'+opt.label+'</div>'});card.innerHTML=html;card.style.opacity=0;requestAnimationFrame(function(){card.style.transition='opacity 0.3s ease';card.style.opacity=1})}
function answer(idx){var q=questions[currentQ];var chosen=q.options[idx];for(var tribe in chosen.scores){if(chosen.scores.hasOwnProperty(tribe)){scores[tribe]+=chosen.scores[tribe]}}if(chosen.axis){axisX+=chosen.axis.x;axisY+=chosen.axis.y}if(chosen.sov!==undefined){sovScore+=chosen.sov}currentQ++;if(currentQ<questions.length){renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}else{showResults()}}
function drawAxis(){var canvas=document.getElementById('axisCanvas');if(!canvas)return;var ctx=canvas.getContext('2d');var w=canvas.width;var h=canvas.height;var cx=w/2;var cy=h/2;var pad=28;ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,0,0,0.015)';ctx.fillRect(0,0,cx,cy);ctx.fillStyle='rgba(0,0,0,0.03)';ctx.fillRect(cx,0,cx,cy);ctx.fillStyle='rgba(0,0,0,0.03)';ctx.fillRect(0,cy,cx,cy);ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(cx,cy,cx,cy);ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,h);ctx.moveTo(0,cy);ctx.lineTo(w,cy);ctx.stroke();ctx.font='9px DM Sans,system-ui';ctx.textAlign='center';figures.forEach(function(f){var fx=cx+f.x*(cx-pad);var fy=cy-f.y*(cy-pad);ctx.fillStyle='#c4bdb0';if(f.shape==='square'){ctx.fillRect(fx-4,fy-4,8,8)}else{ctx.beginPath();ctx.arc(fx,fy,4,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#9a8f82';ctx.fillText(f.name,fx,fy-8)});var maxRange=20*3;var px=cx+(axisX/maxRange)*(cx-pad);var py=cy-(axisY/maxRange)*(cy-pad);var userSov=sovScore>0;ctx.fillStyle='#8b3a3a';ctx.strokeStyle='#fff';ctx.lineWidth=2.5;if(userSov){ctx.beginPath();ctx.arc(px,py,9,0,Math.PI*2);ctx.fill();ctx.stroke()}else{ctx.fillRect(px-8,py-8,16,16);ctx.strokeRect(px-8,py-8,16,16)}ctx.font='bold 10px DM Sans,system-ui';ctx.fillStyle='#8b3a3a';ctx.fillText('You',px,py-15)}
function showResults(){document.getElementById('quiz').style.display='none';var resultsDiv=document.getElementById('results');resultsDiv.style.display='block';var sorted=Object.entries(scores).sort(function(a,b){return b[1]-a[1]});var topKey=sorted[0][0];var topTribe=tribes[topKey];var maxScore=sorted[0][1];var html='<div class="result-hero"><div class="label">Your tribe</div><h2>'+topTribe.name+'</h2><div class="desc">'+topTribe.desc+'</div><div class="moral"><strong>Your moral framework:</strong> '+topTribe.moral+'</div></div>';html+='<div class="axis-chart"><h3>Where you sit</h3><div class="axis-canvas-wrap"><canvas id="axisCanvas" width="300" height="300" class="axis-canvas"></canvas><div class="axis-label top">Utopian</div><div class="axis-label bottom">Constrained</div><div class="axis-label left">Individualist</div><div class="axis-label right">Communitarian</div></div><div class="axis-legend"><span><svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="#c4bdb0"/></svg> Sovereigntist</span><span><svg width="10" height="10"><rect x="1" y="1" width="8" height="8" fill="#c4bdb0"/></svg> Internationalist</span></div><div class="axis-note">Utopian: believes human nature is malleable and society can be perfected through rational design.<br>Constrained: believes human nature is fixed and politics must work within its limits.<br>Your shape shows whether you lean sovereigntist (\u25cf) or internationalist (\u25a0).</div></div>';html+='<div class="runners-up"><h3>Your other tendencies</h3>';var runnersUp=sorted.slice(1,6).filter(function(s){return s[1]>0});runnersUp.forEach(function(item){var key=item[0];var score=item[1];var pct=Math.round((score/maxScore)*100);html+='<div class="runner"><span class="runner-name">'+tribes[key].name+'</span><div class="runner-bar-wrap"><div class="runner-bar" style="width:'+pct+'%"></div></div></div>'});html+='</div><button class="reveal-btn" onclick="showFullMap(\''+topKey+'\')">See all 12 tribes \u2192</button><div class="full-map" id="fullMap"></div>';resultsDiv.innerHTML=html;setTimeout(drawAxis,100);window.scrollTo({top:0,behavior:'smooth'})}
function showFullMap(topKey){document.querySelector('.reveal-btn').style.display='none';var mapDiv=document.getElementById('fullMap');mapDiv.style.display='block';var leftTribes=['fabian','identitarian','revolutionary','progressive','degrowth','bluelabour','union'];var rightTribes=['burkean','thatcherite','natcon','populist','libertarian'];var html='<div class="section-label labour">The Left</div><div class="section-sublabel">Seven worldviews, not all in the same party \u2014 or any party</div>';leftTribes.forEach(function(k){var t=tribes[k];var isYou=k===topKey?' is-you':'';html+='<div class="tribe-card'+isYou+'"><div class="tribe-name">'+t.name+'</div><div class="tribe-people">'+t.people+'</div><div class="tribe-desc">'+t.desc+'</div><div class="tribe-moral"><strong>Moral framework:</strong> '+t.moral+'</div></div>'});html+='<div class="section-label tory">The Right</div><div class="section-sublabel">Five worldviews and a mood</div>';rightTribes.forEach(function(k){var t=tribes[k];var isYou=k===topKey?' is-you':'';html+='<div class="tribe-card'+isYou+'"><div class="tribe-name">'+t.name+'</div><div class="tribe-people">'+t.people+'</div><div class="tribe-desc">'+t.desc+'</div><div class="tribe-moral"><strong>Moral framework:</strong> '+t.moral+'</div></div>'});
html+='<div class="case-study-box"><h2>Case Study: The Assisted Dying Vote (Nov 2024)</h2><div class="cs-subtitle">When the tribes break free of party lines</div><p>The Terminally Ill Adults Bill was a free vote \u2014 no whip, pure conscience. Danny Kruger (national conservative), Jeremy Corbyn (progressive left), Wes Streeting (Fabian), Kemi Badenoch (Thatcherite), and all the Gaza independents voted the same way \u2014 against. All Green MPs voted for.</p><div class="vote-row"><div class="vote-col for"><h3>Voted For (330)</h3><ul><li>\u2726 Most Fabian technocrats</li><li>\u2726 All Green MPs</li><li>\u2726 Most progressive left</li><li>\u2726 Many Thatcherites</li><li>\u2726 Libertarians</li></ul></div><div class="vote-col against"><h3>Voted Against (275)</h3><ul><li>\u2726 National conservatives (Kruger)</li><li>\u2726 Blue Labour / post-liberals</li><li>\u2726 All Gaza independents</li><li>\u2726 Corbyn</li><li>\u2726 Religious MPs across parties</li><li>\u2726 Disability rights advocates</li></ul></div></div><p>The \u201cagainst\u201d coalition is hardest to explain on a left-right axis. What unites Kruger and Corbyn? A shared suspicion that individual autonomy isn\u2019t the highest political value \u2014 that offering death to vulnerable people in an unequal society is naive about how power operates.</p><p>Two completely different moral languages. One parliament.</p></div>';
html+='<div class="frameworks"><h2>Why Everyone Is Shouting Past Each Other</h2><p>These tribes don\u2019t just disagree about policy. They disagree about what counts as a <em>good reason</em> for anything. A utilitarian thinks the right answer is whatever maximises wellbeing. An identitarian thinks it depends on who\u2019s speaking. A Christian socialist thinks human dignity is non-negotiable regardless of outcomes. A Burkean thinks what our ancestors built deserves deference. A libertarian thinks your freedom to choose trumps all of the above.</p><p>The real fault lines don\u2019t run left to right. They run along different axes: <strong>communitarian vs individualist</strong>, <strong>utopian vs constrained</strong>, and <strong>sovereigntist vs internationalist</strong>. The utopian believes human nature is malleable \u2014 that society can be perfected through rational design. The constrained believes human nature is fixed \u2014 fallen, flawed, prone to selfishness \u2014 and that the job of politics is to work with the grain of what we are, not against it.</p><p>Notice who your unexpected neighbours are. Blue Labour and the national conservatives are closer to each other than either is to its own party leadership. Fabians and Cameroon Tories are essentially the same managerial class with different rosettes. Thatcher and Stuart Hall are both internationalists despite being in opposite corners \u2014 one wanted free movement of capital, the other free movement of people.</p><p><strong>What this quiz doesn\u2019t capture:</strong> British politics also contains forms of communal politics organised primarily around faith and ethnicity rather than transferable ideology \u2014 the Gaza independents, the Aspire Party in Tower Hamlets, and historically the various Northern Irish parties. These operate on a completely different logic: politics as community mobilisation rather than ideological choice.</p></div>';
html+='<div class="reading"><h2>Further Reading</h2><p><strong>Christopher Lasch</strong> \u2014 <em>The True and Only Heaven</em> (1991). A sweeping intellectual history of the critique of progress. Very American \u2014 British readers may need to translate.</p><p><strong>Francis Fukuyama</strong> \u2014 <em>The End of History and the Last Man</em> (1992). The book Lasch was arguing against. His later <em>Liberalism and Its Discontents</em> (2022) basically admits the optimist was wrong.</p><p><strong>Alasdair MacIntyre</strong> \u2014 <em>After Virtue</em> (1981). Why modern moral argument is incoherent.</p><p><strong>Gary Dorrien</strong> \u2014 <em>American Democratic Socialism</em> (2021). The definitive history of secular and religious socialisms.</p><p><strong>Michael Sandel</strong> \u2014 <em>The Tyranny of Merit</em> (2020). The most accessible critique of meritocratic liberalism.</p><p><strong>David Goodhart</strong> \u2014 <em>The Road Somewhere</em> (2017). Anywheres vs Somewheres \u2014 the British Lasch.</p><p><strong>Paul Embery</strong> \u2014 <em>Despised</em> (2020). The Blue Labour case.</p><p><strong>Roger Scruton</strong> \u2014 <em>How to Be a Conservative</em> (2014). The Burkean case.</p><p><strong>Eugene McCarraher</strong> \u2014 <em>The Enchantments of Mammon</em> (2019). Capitalism as religion.</p><p><strong>Thomas Piketty</strong> \u2014 <em>Capital in the Twenty-First Century</em> (2013). The inequality data.</p></div>';
